}

// ---------- ZOOM & FULLSCREEN ----------
const ZOOM_MIN = 0.6;
const ZOOM_MAX = 3.0;
const ZOOM_STEP = 0.15;
const BASE_FONT_PX = 15;

function zoomBy(direction) {
  // direction: 1 = zoom in, -1 = zoom out
  const target = state.viewerOpen ? 'viewer' : 'main';
  if (target === 'viewer') {
    state.viewerZoomLevel = clamp(state.viewerZoomLevel + direction * ZOOM_STEP, ZOOM_MIN, ZOOM_MAX);
    applyZoomToViewer();
  } else {
    state.zoomLevel = clamp(state.zoomLevel + direction * ZOOM_STEP, ZOOM_MIN, ZOOM_MAX);
    localStorage.setItem('zoomLevel', String(state.zoomLevel));
    applyZoomToEntryBody();
  }
  showToast(getZoomLabel() + ' • ' + Math.round(getCurrentZoom() * 100) + '%');
}

function resetZoom() {
  if (state.viewerOpen) {
    state.viewerZoomLevel = 1;
    applyZoomToViewer();
  } else {
    state.zoomLevel = 1;
    localStorage.setItem('zoomLevel', '1');
    applyZoomToEntryBody();
  }
  showToast('Đã đặt lại zoom: 100%');
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function getCurrentZoom() {
  return state.viewerOpen ? state.viewerZoomLevel : state.zoomLevel;
}

function getZoomLabel() {
  return state.viewerOpen ? 'Chế độ toàn màn hình' : 'Khung nội dung';
}

function applyZoomToEntryBody() {
  const body = document.getElementById('entryBody');
  if (!body) return;
  const size = BASE_FONT_PX * state.zoomLevel;
  body.style.fontSize = size.toFixed(2) + 'px';
  // Also scale line-height proportionally to keep readability
  body.style.lineHeight = (1.75 * Math.max(0.9, Math.min(1.1, state.zoomLevel))).toFixed(2);
  // Scale the headword too (it lives outside #entryBody)
  const headword = document.querySelector('.entry-headword');
  if (headword) {
    headword.style.fontSize = (28 * state.zoomLevel).toFixed(2) + 'px';
  }
  const lvl = document.getElementById('zoomLevel');
  if (lvl) lvl.textContent = Math.round(state.zoomLevel * 100) + '%';
}

function applyZoomToViewer() {
  const body = document.getElementById('viewerBodyInner');
  if (!body) return;
  const size = BASE_FONT_PX * state.viewerZoomLevel;
  body.style.fontSize = size.toFixed(2) + 'px';
  body.style.lineHeight = (1.75 * Math.max(0.9, Math.min(1.1, state.viewerZoomLevel))).toFixed(2);
  // Scale the headword in viewer too
  const headword = document.querySelector('#viewerBodyInner .entry-headword, #viewerBody .entry-headword');
  if (headword) {
    headword.style.fontSize = (28 * state.viewerZoomLevel).toFixed(2) + 'px';
  }
  const lvl = document.getElementById('viewerZoomLevel');
  if (lvl) lvl.textContent = Math.round(state.viewerZoomLevel * 100) + '%';
}

function openFullscreen(entry) {
  if (!entry) return;
  state.viewerOpen = true;
  state.viewerZoomLevel = state.zoomLevel; // start from current zoom
  const overlay = document.getElementById('viewerOverlay');
  const title = document.getElementById('viewerTitle');
  const inner = document.getElementById('viewerBodyInner');
  const langBadge = dictLangClass(entry.dict);
  const langLabel = dictLabel(entry.dict);
  const headAccent = dictAccent(entry.dict);
  const isHv = isHvDict(entry.dict) || isHvDict(entry.forwardDict);
  // Get pinyin from the appropriate hv dict if available
  let pinyinStr = '';
  if (isHv) {
    const hvDictKey = entry.forwardDict || entry.dict;
    const hvDict = state.dicts[hvDictKey];
    if (hvDict && hvDict.pinyin && typeof entry.idx === 'number') {
      pinyinStr = hvDict.pinyin[entry.idx] || '';
    }
  }
  title.textContent = entry.headword + (pinyinStr ? ' [' + pinyinStr + '] ' : '  ·  ') + langLabel;

  // Build stroke image + meta line for HanViet (same restructure as renderEntry).
  // Image goes into the entry-header next to the headword; meta line below.
  let headerStrokeImgHtml = '';
  let metaLineHtml = '';
  if (isHv) {
    const firstChar = entry.headword.charAt(0);
    const codepoint = firstChar.codePointAt(0).toString(16);
    const gifName = codepoint + '.gif';
    const hasGif = HV_GIFS_AVAILABLE.has(gifName);
    headerStrokeImgHtml = hasGif
      ? `<img class="entry-stroke-img" src="${GIFS_BASE}${gifName}" alt="Nét bút ${escapeAttr(firstChar)}" loading="lazy">`
      : `<span class="entry-stroke-fallback" title="Ảnh nét bút chưa có">${escapeHtml(firstChar)}</span>`;
    metaLineHtml = `
      <div class="entry-meta-line">
        ${pinyinStr ? `<span class="em-pinyin">[${escapeHtml(pinyinStr)}]</span>` : ''}
        <span class="em-field"><b>Unicode:</b> U+${codepoint.toUpperCase()}</span>
        <span class="em-field"><b>Số nét bút:</b> ${hasGif ? 'xem ảnh hoạt hình bên cạnh mục từ' : 'ảnh chưa có'}</span>
      </div>`;
  }

  // Build compound panel for HanViet single-char entries (same as renderEntry).
  // Works for hv.
  let compoundsHtml = '';
  if (isHv && entry.headword.length === 1) {
    const hvDictKey = entry.forwardDict || entry.dict;
    const hvDict = state.dicts[hvDictKey];
    const rc = entry.headword;
    const compoundIdxs = hvDict && hvDict.compounds ? hvDict.compounds[rc] : null;
    if (compoundIdxs && compoundIdxs.length > 0) {
      const items = compoundIdxs
        .slice(0, 200)
        .map(i => ({
          idx: i,
          h: hvDict.words[i],
          p: hvDict.pinyin ? hvDict.pinyin[i] : '',
          m: (hvDict.bodies[i] || '').replace(/\[[^\]]*\]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 80)
        }))
        .sort((a, b) => a.h.length - b.h.length || a.h.localeCompare(b.h))
        .slice(0, 100);
      compoundsHtml = `
        <div class="hv-compounds">
          <div class="hv-compounds-title">
            <span>Từ phái sinh</span>
            <span class="badge">${items.length}</span>
          </div>
          <div class="hv-compound-grid">
            ${items.map(it => `
              <button type="button" class="hv-compound-item" data-compound-idx="${it.idx}" data-compound-dict="${hvDictKey}">
                <span class="ci-hanzi">${escapeHtml(it.h)}</span>
                ${it.p ? `<span class="ci-pinyin">[${escapeHtml(it.p)}]</span>` : ''}
                <span class="ci-meaning">${escapeHtml(it.m)}</span>
              </button>
            `).join('')}
          </div>
        </div>`;
    }
  }

  inner.innerHTML = `
    <div class="entry-header" style="margin-bottom:16px">
      <div class="entry-headword" style="font-size:${(32 * Math.max(0.85, Math.min(1.4, state.viewerZoomLevel))).toFixed(0)}px">${escapeHtml(entry.headword)}</div>
      ${headerStrokeImgHtml}
      ${pinyinStr ? `<div style="font-size:22px;color:var(--hv);font-style:italic;font-weight:600;margin-left:12px">[${escapeHtml(pinyinStr)}]</div>` : ''}
      <span class="entry-lang-badge ${langBadge}">${escapeHtml(langLabel)}</span>
    </div>
    ${metaLineHtml}
    <div class="dsl-body">${renderDsl(entry.body, entry.headword, langBadge, entry.dict)}</div>
    ${compoundsHtml}
  `;
  // Copy theme to overlay
  const theme = document.documentElement.getAttribute('data-theme') || 'light';
  // overlay already inherits via :root
  overlay.classList.add('visible');
  overlay.setAttribute('aria-hidden', 'false');
  applyZoomToViewer();
  // Wire up audio + ref clicks inside overlay
  overlay.querySelectorAll('.audio').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      speak(btn.dataset.word, btn.dataset.accent, btn);
    });
  });
  overlay.querySelectorAll('.ref, .char-ref').forEach(r => {
    r.addEventListener('click', () => {
      const word = r.dataset.ref;
      // Close overlay, navigate to referenced word
      closeFullscreen();
      $('#searchInput').value = word;
      doSearch(word);
    });
  });
  // Compound clicks inside overlay — stay in the same HV dict (hv)
  overlay.querySelectorAll('.hv-compound-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.compoundIdx, 10);
      const hvDictKey = btn.dataset.compoundDict || 'hv';
      const hvDict = state.dicts[hvDictKey];
      if (!hvDict) return;
      // Re-render inside the overlay with the new entry
      const newEntry = { dict: hvDictKey, forwardDict: hvDictKey, idx, headword: hvDict.words[idx], body: hvDict.bodies[idx] };
      state.currentEntry = newEntry;
      closeFullscreen();
      $('#searchInput').value = newEntry.headword;
      if (state.currentLang !== hvDictKey) {
        state.currentLang = hvDictKey;
        state.reverse = false;
        updateLangTabsUI();
        updateDirToggleUI();
      }
      doSearch(newEntry.headword);
      renderEntry(newEntry);
    });
  });
  // Pronounce button in toolbar
  const pronBtn = document.getElementById('viewerPronBtn');
  pronBtn.onclick = () => speak(entry.headword, headAccent, pronBtn);
  // Focus overlay for keyboard
  overlay.focus();
  showToast('Toàn màn hình • Esc để thoát • Ctrl +/− để zoom');
}

function closeFullscreen() {
  state.viewerOpen = false;
  const overlay = document.getElementById('viewerOverlay');
  overlay.classList.remove('visible');
  overlay.setAttribute('aria-hidden', 'true');
  document.getElementById('viewerBodyInner').innerHTML = '';
}

// ---------- FAVORITES ----------
function toggleFavorite(entry) {
  const idx = state.favorites.findIndex(f => f.dict === entry.dict && f.idx === entry.idx);
  if (idx >= 0) {
    state.favorites.splice(idx, 1);
    showToast('Đã bỏ yêu thích');
  } else {
    state.favorites.unshift({
      dict: entry.dict,
      forwardDict: entry.forwardDict || entry.dict,
      idx: entry.idx,
      headword: entry.headword,
      body: entry.body,
      ts: Date.now()
    });
    showToast('Đã thêm yêu thích');
  }
  localStorage.setItem('favorites', JSON.stringify(state.favorites));
  renderSidebar();
  renderEntry(entry);
}

// ---------- SEARCH ACTIONS ----------
// ---------- AUTO DIRECTION DETECTION ----------
// When the user types a query whose script clearly belongs to the *other*
// side of a bidirectional dictionary, automatically flip the direction so
// they get results without having to manually click the dir-toggle.
//
// Examples:
//   - In "Anh ↔ Hàn" forward mode, typing Hangul → flip to reverse (Hàn → Anh)
//   - In "Anh ↔ Hàn" reverse mode, typing pure Latin → flip to forward (Anh → Hàn)
//   - In "Anh ↔ Việt" forward mode, typing Vietnamese-unique chars → flip to reverse
//   - In "Hán ↔ Việt" reverse mode, typing CJK chars → flip to forward
//
// Detection is intentionally conservative — only flips on unambiguous script
// signals. Pure-ASCII Latin in av/pv is NOT auto-flipped because it could be
// either English or Vietnamese-without-diacritics.
//
// Returns true if direction was flipped (caller should refresh dir-toggle UI).
function maybeAutoFlipDirection(query) {
  if (!query || !query.trim()) return false;
  const lang = state.currentLang;
  if (!BIDIR_PAIRS[lang]) return false; // not bidirectional — no flip

  const wordLang = detectWordLang(query);
  if (!wordLang) return false;

  let shouldFlip = false;
  if (lang === 'ek') {
    // Anh ↔ Hàn: forward = English headwords, reverse = Hangul headwords
    if (wordLang === 'hangul') shouldFlip = !state.reverse;     // forward → reverse
    else if (wordLang === 'latin') shouldFlip = state.reverse;  // reverse → forward
  } else if (lang === 'av') {
    // Anh ↔ Việt: forward = English headwords, reverse = Vietnamese body
    if (wordLang === 'vi') shouldFlip = !state.reverse;
  } else if (lang === 'pv') {
    // Pháp ↔ Việt: forward = French headwords, reverse = Vietnamese body
    if (wordLang === 'vi') shouldFlip = !state.reverse;
    else if (wordLang === 'fr') shouldFlip = state.reverse;
  } else if (lang === 'hv') {
    // Hán ↔ Việt: forward = Hanzi headwords (Latin = pinyin IME), reverse = Vietnamese body
    if (wordLang === 'vi') shouldFlip = !state.reverse;
    else if (wordLang === 'cjk') shouldFlip = state.reverse;
  }

  if (shouldFlip) {
    state.reverse = !state.reverse;
    updateDirToggleUI();
    return true;
  }
  return false;
}

const doSearch = debounce(function(query, opts) {
  opts = opts || {};
  state.searchQuery = query;
  if (!query || !query.trim()) {
    state.searchResults = [];
    state.acSelectedIdx = -1;
    if (state.currentTab === 'search') renderSidebar();
    return;
  }
  // Auto-flip direction if query script doesn't match current direction.
  // Skip when caller explicitly disables it (e.g. user just clicked dir-toggle).
  if (!opts.skipAutoFlip) {
    maybeAutoFlipDirection(query);
  }
  const results = searchAll(query);
  state.searchResults = results;
  state.acSelectedIdx = -1;
  if (state.currentTab === 'search') renderSidebar();
}, SEARCH_DEBOUNCE);

function doImmediateLookup(query) {
  if (!query || !query.trim()) return;
  // Auto-flip direction (same logic as doSearch) so Enter / dblclick also benefit.
  maybeAutoFlipDirection(query);
  const results = searchAll(query);
  state.searchResults = results;
  state.searchQuery = query;
  if (results.length === 0) {
    if (state.currentTab === 'search') renderSidebar();
    showToast('Không tìm thấy: ' + query);
    return;
  }
  const qnorm = normalize(query);
  let exact = results.find(r => normalize(r.headword) === qnorm);
  if (!exact) exact = results[0];
  const fwdKey = exact.forwardDict || exact.dict;
  const dict = state.dicts[fwdKey];
  const entry = {
    dict: exact.dict,
    forwardDict: fwdKey,
    idx: exact.idx,
    headword: exact.headword,
    body: exact.body || dict.bodies[exact.idx]
  };
  state.currentEntry = entry;
  state.acSelectedIdx = -1;
  if (state.currentTab === 'search') renderSidebar();
  renderEntry(entry);
}

// ---------- DOUBLE-CLICK WORD SEARCH ----------
// When user double-clicks a word inside the entry body, detect the language
// of that word and dispatch to the most relevant dictionary/direction:
//   - CJK chars      → hv forward (Hán → Việt)
//   - Hangul         → ke forward (Hàn → Anh)
//   - Vietnamese     → reverse direction of current bidir dict (av/pv/hv)
//   - Pure Latin     → forward search; in pv stays in pv (assume French),
//                      otherwise defaults to av (Anh → Việt)
// Excludes clicks on interactive elements (buttons, .ref links, .hv-compound-item)
// which already have their own single-click behavior.

// Characters uniquely Vietnamese (NOT shared with French): ă/ơ/ư/đ + tone marks
const VI_UNIQUE_REGEX = /[ăĂơƠưƯđĐạảãặằắẳẵấầẩẫậẹẻẽệếềểễỉịọỏõộồổỗợờớởỡụủũựừứửữỳỵỷỹẠẢÃẶẰẮẲẴẤẦẨẪẬẸẺẼỆẾỀỂỄỈỊỌỎÕỘỒỔỖỢỜỚỞỠỤỦŨỰỪỨỬỮỲỴỶỸ]/;
const CJK_REGEX = /[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/;
const HANGUL_REGEX = /[\uac00-\ud7af\u1100-\u11ff\u3130-\u318f]/;

function detectWordLang(word) {
  if (!word) return null;
  if (CJK_REGEX.test(word)) return 'cjk';
  if (HANGUL_REGEX.test(word)) return 'hangul';
  if (VI_UNIQUE_REGEX.test(word)) return 'vi';
  // French-only chars (ç, œ, Ç, Œ) — present in French, not in Vietnamese
  if (/[çœÇŒ]/.test(word)) return 'fr';
  // Pure Latin (English, French without diacritics, or Vietnamese without diacritics)
  if (/[a-zA-Zà-ÿÀ-Ÿ]/.test(word)) return 'latin';
  return null;
}

// Strip leading/trailing punctuation/whitespace from a double-clicked selection
function cleanDoubleClickWord(raw) {
  if (!raw) return '';
  return raw
    .trim()
    .replace(/^[\s,.;:!?'"\(\)\[\]«»“”"''`~@#$%^&*+=|\\/<>—–·•◦‣→←]+$/, '')
    .replace(/^[\s,.;:!?'"\(\)\[\]«»“”"''`~@#$%^&*+=|\\/<>—–·•◦‣→←]+/, '')
    .replace(/[\s,.;:!?'"\(\)\[\]«»“”"''`~@#$%^&*+=|\\/<>—–·•◦‣→←]+$/, '')
    .trim();
}

function dictDoubleClickSearch(rawWord) {
  const word = cleanDoubleClickWord(rawWord);
  if (!word || word.length < 1 || word.length > 80) return;
  // Require at least one letter/CJK/Hangul char
  if (!/[a-zA-Zà-ÿÀ-Ÿ\uac00-\ud7af\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/.test(word)) return;

  const lang = detectWordLang(word);
  if (!lang) {
    showToast('Không nhận dạng được ngôn ngữ: "' + word + '"');
    return;
  }

  const cur = state.currentLang;
  let targetLang = cur;
  let targetReverse = state.reverse;

  if (lang === 'cjk') {
    targetLang = 'hv';
    targetReverse = false;
  } else if (lang === 'hangul') {
    // Hangul word → "Anh ↔ Hàn" tab + reverse direction = Hàn → Anh
    // (internally uses the 'ke' dict via BIDIR_PAIRS.ek.reverse)
    // Previously this set targetLang='ke' which has NO corresponding UI tab,
    // leaving no tab highlighted and the direction toggle hidden — so users
    // thought the Korean dictionary was broken.
    targetLang = 'ek';
    targetReverse = true;
  } else if (lang === 'vi') {
    // Vietnamese word → reverse direction of any bidir dict (av/pv/hv).
    // Prefer staying in the same dict family if currently bidirectional.
    if (cur === 'av' || cur === 'pv' || cur === 'hv') {
      targetLang = cur;
      targetReverse = true;
    } else {
      targetLang = 'av';
      targetReverse = true;
    }
  } else if (lang === 'fr') {
    // French-specific chars → pv forward
    targetLang = 'pv';
    targetReverse = false;
  } else if (lang === 'latin') {
    // Pure Latin without diacritics — could be English or French.
    // Heuristic: stay in pv if currently there (assume French),
    //            stay in ek/ke if currently there (assume English, switch direction if needed),
    //            otherwise default to av forward.
    if (cur === 'pv') {
      targetLang = 'pv';
      targetReverse = false;
    } else if (cur === 'ek') {
      targetLang = 'ek';
      targetReverse = false;
    } else if (cur === 'ke') {
      targetLang = 'ek';     // English word → Anh → Hàn
      targetReverse = false;
    } else {
      targetLang = 'av';
      targetReverse = false;
    }
  }

  // Apply state and UI
  if (state.currentLang !== targetLang || state.reverse !== targetReverse) {
    state.currentLang = targetLang;
    state.reverse = targetReverse;
    updateLangTabsUI();
    updateDirToggleUI();
  }

  // Update input + run search (auto-open first/exact match)
  $('#searchInput').value = word;
  doImmediateLookup(word);

  // Visual feedback — use reverse-direction label when applicable so the
  // toast matches what the user actually sees in the dir-toggle.
  let targetLabel = FILES[targetLang] ? FILES[targetLang].label : targetLang;
  if (targetReverse && BIDIR_PAIRS[targetLang]) {
    targetLabel = BIDIR_PAIRS[targetLang].label;
  }
  showToast('Tra: "' + word + '" → ' + targetLabel);
}

// ---------- RANDOM ----------
function showRandom() {
  // Pick a random dictionary among the active ones
  let allDicts;
  if (state.currentLang === 'all') {
    allDicts = ['av', 'pv', 'ek', 'ke', 'hv'];
  } else if (state.reverse) {
    // Reverse mode: only pick from underlying forward dicts that have bodies we can search
    if (state.currentLang === 'ek') allDicts = ['ke'];
    else allDicts = [state.currentLang];  // av/pv/hv use same dict, just reverse search
  } else {
    allDicts = [state.currentLang];
  }
  const dictKey = allDicts[Math.floor(Math.random() * allDicts.length)];
  const dict = state.dicts[dictKey];
  if (!dict) return;
  let attempts = 0;
  while (attempts < 80) {
    const idx = Math.floor(Math.random() * dict.words.length);
    const hw = dict.words[idx];
    if (!hw) { attempts++; continue; }
    if (hw.length < 1 || hw.length > 24) { attempts++; continue; }
    if (/[a-zA-ZÀ-ỹ\uac00-\ud7af\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/.test(hw)) {
      // Determine display key based on direction
      let displayKey = dictKey;
      if (state.reverse && BIDIR_PAIRS[state.currentLang]) {
        displayKey = BIDIR_PAIRS[state.currentLang].reverse;
      }
      const entry = { dict: displayKey, forwardDict: dictKey, idx, headword: hw, body: dict.bodies[idx] };
      state.currentEntry = entry;
      $('#searchInput').value = hw;
      doSearch(hw);
      renderEntry(entry);
      return;
    }
    attempts++;
  }
  // fallback: just pick anything
  const idx = Math.floor(Math.random() * dict.words.length);
  const hw = dict.words[idx];
  let displayKey = dictKey;
  if (state.reverse && BIDIR_PAIRS[state.currentLang]) {
    displayKey = BIDIR_PAIRS[state.currentLang].reverse;
  }
  const entry = { dict: displayKey, forwardDict: dictKey, idx, headword: hw, body: dict.bodies[idx] };
  state.currentEntry = entry;
  $('#searchInput').value = hw;
  doSearch(hw);
  renderEntry(entry);
}

// ---------- RESIZE HANDLE (split view) ----------
// Allow user to drag the divider between sidebar and content to resize them.
// Persists the chosen width in localStorage so it survives page reloads.
const SIDEBAR_MIN = 220;
const SIDEBAR_MAX_RATIO = 0.7;  // sidebar can't be more than 70% of viewport width
const SIDEBAR_DEFAULT = 260;

function setupResizeHandle() {
  const handle = document.getElementById('resizeHandle');
  if (!handle) return;
  // Restore saved width
  const saved = parseFloat(localStorage.getItem('sidebarW'));
  if (saved && saved >= SIDEBAR_MIN) {
    document.documentElement.style.setProperty('--sidebar-w', saved + 'px');
  } else {
    document.documentElement.style.setProperty('--sidebar-w', SIDEBAR_DEFAULT + 'px');
  }
  let dragging = false;
  let startX = 0;
  let startW = 0;
  const onMove = (e) => {
    if (!dragging) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const delta = x - startX;
    let w = startW + delta;
    const maxW = Math.floor(window.innerWidth * SIDEBAR_MAX_RATIO);
    w = Math.max(SIDEBAR_MIN, Math.min(maxW, w));
    document.documentElement.style.setProperty('--sidebar-w', w + 'px');
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // Persist
    const cur = document.documentElement.style.getPropertyValue('--sidebar-w');
    if (cur) localStorage.setItem('sidebarW', cur);
  };
  const onDown = (e) => {
    dragging = true;
    startX = e.touches ? e.touches[0].clientX : e.clientX;
    const cur = document.documentElement.style.getPropertyValue('--sidebar-w') || (SIDEBAR_DEFAULT + 'px');
    startW = parseFloat(cur) || SIDEBAR_DEFAULT;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  };
  handle.addEventListener('mousedown', onDown);
  handle.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
  // Double-click resets to default width
  handle.addEventListener('dblclick', () => {
    document.documentElement.style.setProperty('--sidebar-w', SIDEBAR_DEFAULT + 'px');
    localStorage.setItem('sidebarW', String(SIDEBAR_DEFAULT));
    showToast('Đã đặt lại kích thước');
  });
}

// ---------- EVENT WIRING ----------
// Update lang-tab labels and active state based on state.currentLang + state.reverse
function updateLangTabsUI() {
  $$('.lang-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.lang === state.currentLang);
  });
}
// Compact labels for dir-toggle to save horizontal header space.
const DIR_TOGGLE_LABELS = {
  av:  { fwd: '↷ Anh→Việt', rev: '↶ Việt→Anh' },
  pv:  { fwd: '↷ Pháp→Việt', rev: '↶ Việt→Pháp' },
  ek:  { fwd: '↷ Anh→Hàn', rev: '↶ Hàn→Anh' },
  hv:  { fwd: '↷ Hán→Việt', rev: '↶ Việt→Hán' }
};
function updateDirToggleUI() {
  const dir = $('#dirToggle');
  const lbl = $('#dirLabel');
  if (!dir || !lbl) return;
  // Only show toggle for bidirectional dicts (av/pv/ek/hv). Hide for "all".
  const isBidir = BIDIR_PAIRS[state.currentLang] !== undefined;
  dir.style.display = isBidir ? '' : 'none';
  if (!isBidir) return;
  const labels = DIR_TOGGLE_LABELS[state.currentLang] || { fwd: '↷', rev: '↶' };
  if (state.reverse) {
    dir.classList.add('reverse');
    lbl.textContent = labels.rev;
  } else {
    dir.classList.remove('reverse');
    lbl.textContent = labels.fwd;
  }
}

function setupEvents() {
  const input = $('#searchInput');
  const clear = $('#searchClear');

  input.addEventListener('input', () => {
    clear.classList.toggle('visible', input.value.length > 0);
    doSearch(input.value);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' && state.searchResults.length > 0) {
      e.preventDefault();
      state.acSelectedIdx = Math.min(state.acSelectedIdx + 1, state.searchResults.length - 1);
      updateAcSelection();
    } else if (e.key === 'ArrowUp' && state.searchResults.length > 0) {
      e.preventDefault();
      state.acSelectedIdx = Math.max(state.acSelectedIdx - 1, 0);
      updateAcSelection();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (state.acSelectedIdx >= 0 && state.searchResults[state.acSelectedIdx]) {
        selectSearchResult(state.acSelectedIdx);
      } else if (state.searchResults.length > 0) {
        selectSearchResult(0);
      } else {
        doImmediateLookup(input.value);
      }
    } else if (e.key === 'Escape') {
      input.value = '';
      clear.classList.remove('visible');
      state.searchQuery = '';
      state.searchResults = [];
      state.acSelectedIdx = -1;
      renderSidebar();
      input.blur();
    }
  });

  clear.addEventListener('click', () => {
    input.value = '';
    clear.classList.remove('visible');
    state.searchQuery = '';
    state.searchResults = [];
    state.acSelectedIdx = -1;
    renderSidebar();
    input.focus();
  });

  // Sidebar tabs
  $$('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      $$('.sidebar-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.currentTab = tab.dataset.tab;
      renderSidebar();
      if (state.currentTab === 'search') input.focus();
    });
  });

  // Language tabs
  $$('.lang-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      $$('.lang-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.currentLang = tab.dataset.lang;
      // When switching tab, reset direction to forward (Xuôi) by default
      state.reverse = false;
      updateDirToggleUI();
      if (input.value.trim()) doSearch(input.value);
    });
  });

  // Direction toggle (Xuôi / Ngược)
  $('#dirToggle').addEventListener('click', () => {
    if (!BIDIR_PAIRS[state.currentLang]) return;
    state.reverse = !state.reverse;
    updateDirToggleUI();
    // User explicitly toggled direction — skip auto-flip so we don't undo it.
    if (input.value.trim()) doSearch(input.value, { skipAutoFlip: true });
  });

  // Theme toggle
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  $('#themeBtn').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // Random
  $('#randomBtn').addEventListener('click', showRandom);

  // Initial UI state for direction toggle
  updateDirToggleUI();

  // Resizable split view (sidebar / content)
  setupResizeHandle();

  // Viewer (fullscreen overlay) controls
  document.getElementById('viewerClose').addEventListener('click', closeFullscreen);
  document.getElementById('viewerZoomIn').addEventListener('click', () => zoomBy(1));
  document.getElementById('viewerZoomOut').addEventListener('click', () => zoomBy(-1));
  document.getElementById('viewerZoomReset').addEventListener('click', resetZoom);

  // Warm up TTS on first interaction (any click or keydown)
  const warmupHandler = () => {
    warmupTts();
    document.removeEventListener('click', warmupHandler);
    document.removeEventListener('keydown', warmupHandler);
  };
  document.addEventListener('click', warmupHandler);
  document.addEventListener('keydown', warmupHandler);

  // Keyboard shortcut: / to focus search, p to pronounce current entry
  // Ctrl +/- for zoom, F for fullscreen, Esc to close viewer
  document.addEventListener('keydown', (e) => {
    // Ctrl + + / = / - / 0 for zoom
    if (e.ctrlKey || e.metaKey) {
      if (e.key === '+' || e.key === '=') {
        e.preventDefault();
        zoomBy(1);
        return;
      }
      if (e.key === '-' || e.key === '_') {
        e.preventDefault();
        zoomBy(-1);
        return;
      }
      if (e.key === '0') {
        e.preventDefault();
        resetZoom();
        return;
      }
    }
    // Esc closes fullscreen viewer
    if (e.key === 'Escape' && state.viewerOpen) {
      e.preventDefault();
      closeFullscreen();
      return;
    }
    // F opens fullscreen viewer (only when an entry is shown and not typing)
    if ((e.key === 'f' || e.key === 'F') && document.activeElement !== input && state.currentEntry && !state.viewerOpen) {
      e.preventDefault();
      openFullscreen(state.currentEntry);
      return;
    }
    if (e.key === '/' && document.activeElement !== input) {
      e.preventDefault();
      input.focus();
    } else if ((e.key === 'p' || e.key === 'P') && document.activeElement !== input && state.currentEntry) {
      e.preventDefault();
      const accent = dictAccent(state.currentEntry.dict);
      speak(state.currentEntry.headword, accent, $('#pronHeadwordBtn'));
    }
  });

  // Double-click word inside entry content → auto-search in the most
  // relevant dictionary based on detected language of the word.
  // Ignore double-clicks on interactive elements that already have their
  // own click behavior (audio buttons, ref links, compound items, action buttons).
  const resultEl = document.getElementById('result');
  if (resultEl) {
    resultEl.addEventListener('dblclick', (e) => {
      // Skip if user double-clicked an interactive element
      const interactive = e.target.closest(
        'button, .audio, .ref, .char-ref, .hv-compound-item, .quick-word, a, input, .zoom-btn, .entry-action-btn, .entry-pron-btn'
      );
      if (interactive) return;
      // Get selected word (from selection, since dblclick selects a word in most browsers)
      const sel = window.getSelection && window.getSelection();
      let word = sel && sel.toString ? sel.toString() : '';
      // Fallback to textContent of the immediate text node target if selection is empty
      if (!word && e.target && e.target.nodeType === Node.TEXT_NODE) {
        word = e.target.textContent.trim();
      }
      if (!word && e.target && e.target.textContent) {
        // For CJK chars, browsers usually select just one char on dblclick
        // — try to grab the text under the cursor
        word = e.target.textContent.trim().split(/\s+/)[0] || '';
      }
      if (word) {
        e.preventDefault();
        dictDoubleClickSearch(word);
      }
    });
    // Visual hint: cursor indicates clickable text inside entry body
    // (applied via CSS .entry-dblclick-hint class)
    resultEl.classList.add('entry-dblclick-hint');
  }
}

// ---------- BOOT ----------
setupEvents();
init();

</script>
